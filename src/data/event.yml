hero:
  tagline: "Ślub"
  title: "Sylwii i Michała"
  description: >
    Zaczynamy od najważniejszego „TAK” w murach kościoła — to dopiero początek naszej wspólnej przygody. Zaraz po ceremonii wypływamy statkiem, by wieczór spędzić razem z Wami.

    W namiocie bankietowym czekać będą wyśmienite drinki i pyszne jedzenie, ale przede wszystkim wspólna zabawa. Chcemy, żeby ten sierpniowy wieczór trwał jak najdłużej — zostańcie z nami na parkiecie aż do białego rana!
  weekday: "Czwartek"
  dateDisplay: "06 · 08 · 2026"
  location: "Wrocław • Kościół Rzymskokatolicki pw. NMP na Piasku • Hotel Wodnik"

story:
  chapterLabel: "Rozdział pierwszy"
  heading: "Nasza historia"
  body: |
    Poznaliśmy się pewnego rześkiego, jesiennego popołudnia, w ciszy pandemicznych dni. Choć świat zwolnił, między nami wszystko potoczyło się naturalnie — połączyła nas miłość do wody i żagli. Rozmowy o pasjach i marzeniach szybko przerodziły się w głęboką więź.

    Dziś, patrząc na to, jak daleko dopłynęliśmy, nie możemy się doczekać tego, co przed nami. Ogromnie cieszymy się, że w tym wyjątkowym dniu będziecie z nami — nasi przyjaciele i rodzina, którzy towarzyszyli nam od samego początku.
  imageAsset: "sesja1.jpg"
  imageAlt: "Nasza wspólna historia"


schedule:
  eyebrow: "Nasze świętowanie"
  title: "Harmonogram dnia ślubu"
  description: >
    Śledź z nami każdy cenny moment — od przysięg po ostatni błyszczący toast.
  events:
    - number: "01"
      label: "Kościół"
      title: "Ceremonia w kościele"
      description: >
        Uroczysty ślub w kościele o 16:00. Prosimy o punktualne przybycie, by wspólnie
        rozpocząć nasz dzień w modlitwie i błogosławieństwie.
      details:
        - "Ceremonia rozpoczyna się o 16:00"
        - "Prosimy o przybycie 15 minut wcześniej"
        - "Prosimy o wyciszenie telefonów"
    - number: "02"
      label: "Rejs"
      title: "Rejs statkiem po Odrze"
      description: >
        Po ceremonii zapraszamy na rejs statkiem po Odrze — popłyniemy z kościoła
        bezpośrednio do Hotelu Wodnik, gdzie kontynuujemy świętowanie.
      details:
        - "Zaokrętowanie po ceremonii (około 17:15)"
        - "Przewidywany czas rejsu: ~45 minut"
        - "Na pokładzie będą serwowane przekąski i drinki"
    - number: "03"
      label: "Przyjęcie"
      title: "Przyjęcie w namiocie"
      description: >
        Po dopłynięciu do Hotelu Wodnik zapraszamy do namiotu na przyjęcie — obiad,
        pierwszy taniec, zdjęcia, drinki i zabawa do późna.
      details:
        - "Wezwanie do stołu na obiad o 19:00"
        - "Pierwszy taniec około 20:30"
        - "Fotobudka i sesje zdjęciowe przez całą noc"
        - "DJ i tańce do późnych godzin"

